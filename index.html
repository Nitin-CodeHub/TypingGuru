    <script data-arena-recording="true">
      (function () {
        "use strict";
        var SK = "__arena_rec",
          RRWEB_CDN =
            "https://cdn.jsdelivr.net/npm/rrweb@2.0.0-alpha.4/dist/rrweb.min.js";
        var MAX_RECORDING_MS = 600000,
          MAX_RRWEB_EVENTS = 30000,
          MAX_INTERACTIONS = 5000,
          MAX_CURSOR_POINTS = 10000,
          recStopped = false;
        var stored = null;
        try {
          var raw = sessionStorage.getItem(SK);
          if (raw) stored = JSON.parse(raw);
        } catch (ex) {}
        var meta = stored ? stored.m || null : null,
          rrwebEvents = stored ? stored.r || [] : [],
          rrwebStarted = false,
          startTime = stored ? stored.st || Date.now() : Date.now();
        var interactions = stored ? stored.i || [] : [],
          cursorPath = stored ? stored.c || [] : [],
          lastCursorSample = 0,
          lastScrollSample = 0;
        var pageHeight = document.documentElement.scrollHeight;
        var viewport = { width: window.innerWidth, height: window.innerHeight };
        function isCapped() {
          if (recStopped) return true;
          if (Date.now() - startTime >= MAX_RECORDING_MS) {
            recStopped = true;
            return true;
          }
          return false;
        }
        function persist() {
          try {
            var d = JSON.stringify({
              r: rrwebEvents,
              i: interactions,
              c: cursorPath,
              m: meta,
              st: startTime,
            });
            sessionStorage.setItem(SK, d);
          } catch (ex) {
            rrwebEvents = rrwebEvents.slice(Math.floor(rrwebEvents.length / 2));
            try {
              sessionStorage.setItem(
                SK,
                JSON.stringify({
                  r: rrwebEvents,
                  i: interactions,
                  c: cursorPath,
                  m: meta,
                  st: startTime,
                }),
              );
            } catch (ex2) {}
          }
        }
        setInterval(persist, 5000);
        window.addEventListener("resize", function () {
          viewport = { width: window.innerWidth, height: window.innerHeight };
          pageHeight = document.documentElement.scrollHeight;
        });
        document.addEventListener(
          "click",
          function (e) {
            if (isCapped() || interactions.length >= MAX_INTERACTIONS) return;
            var el = e.target;
            var tag = el.tagName ? el.tagName.toLowerCase() : "";
            var text = (el.textContent || "").trim().substring(0, 80);
            var classes =
              el.className && typeof el.className === "string"
                ? el.className.substring(0, 120)
                : "";
            interactions.push({
              type: "click",
              t: Date.now() - startTime,
              x: Math.round(e.clientX),
              y: Math.round(e.clientY),
              element: { tag: tag, text: text, classes: classes },
            });
          },
          true,
        );
        window.addEventListener(
          "scroll",
          function () {
            if (isCapped() || interactions.length >= MAX_INTERACTIONS) return;
            var now = Date.now();
            if (now - lastScrollSample < 200) return;
            lastScrollSample = now;
            var scrollY = Math.round(window.scrollY || window.pageYOffset || 0);
            var depthPct =
              pageHeight > viewport.height
                ? Math.min(
                    100,
                    Math.round(
                      ((scrollY + viewport.height) / pageHeight) * 100,
                    ),
                  )
                : 100;
            interactions.push({
              type: "scroll",
              t: now - startTime,
              y: scrollY,
              depth_pct: depthPct,
            });
          },
          { passive: true },
        );
        document.addEventListener(
          "mousemove",
          function (e) {
            if (isCapped() || cursorPath.length >= MAX_CURSOR_POINTS) return;
            var now = Date.now();
            if (now - lastCursorSample < 250) return;
            lastCursorSample = now;
            cursorPath.push([
              Math.round(e.clientX),
              Math.round(e.clientY),
              now - startTime,
            ]);
          },
          { passive: true },
        );
        document.addEventListener(
          "keydown",
          function (e) {
            if (isCapped() || interactions.length >= MAX_INTERACTIONS) return;
            if (
              e.target &&
              (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")
            )
              return;
            interactions.push({
              type: "keydown",
              t: Date.now() - startTime,
              key: e.key,
            });
          },
          true,
        );
        function buildAnalytics() {
          if (!meta) return null;
          var ph = document.documentElement.scrollHeight;
          var maxScroll = 0,
            clickElements = {},
            firstClick = null,
            firstScroll = null,
            totalDistance = 0;
          for (var i = 0; i < interactions.length; i++) {
            var ev = interactions[i];
            if (ev.type === "scroll") {
              if (ev.depth_pct > maxScroll) maxScroll = ev.depth_pct;
              if (!firstScroll) firstScroll = ev.t;
            }
            if (ev.type === "click") {
              if (!firstClick) firstClick = ev.t;
              var key = ev.element.tag + ":" + ev.element.text.substring(0, 30);
              clickElements[key] = true;
            }
          }
          for (var j = 1; j < cursorPath.length; j++) {
            var dx = cursorPath[j][0] - cursorPath[j - 1][0];
            var dy = cursorPath[j][1] - cursorPath[j - 1][1];
            totalDistance += Math.sqrt(dx * dx + dy * dy);
          }
          var duration = Date.now() - startTime;
          var clickHeatmap = [];
          for (var k = 0; k < interactions.length; k++) {
            if (interactions[k].type === "click")
              clickHeatmap.push([interactions[k].x, interactions[k].y]);
          }
          return {
            generation_id: meta.generationId,
            tournament_id: meta.tournamentId,
            started_at: new Date(startTime).toISOString(),
            ended_at: new Date().toISOString(),
            duration_ms: duration,
            viewport: viewport,
            page_height: ph,
            interactions: interactions,
            cursor_path: cursorPath,
            click_heatmap: clickHeatmap,
            summary: {
              total_clicks: clickHeatmap.length,
              total_scrolls: interactions.filter(function (e) {
                return e.type === "scroll";
              }).length,
              max_scroll_depth_pct: maxScroll,
              unique_elements_clicked: Object.keys(clickElements).length,
              time_to_first_click_ms: firstClick,
              time_to_first_scroll_ms: firstScroll,
              cursor_distance_px: Math.round(totalDistance),
              active_time_ms: duration,
            },
          };
        }
        function loadRrweb() {
          if (rrwebStarted) return;
          rrwebStarted = true;
          var s = document.createElement("script");
          s.src = RRWEB_CDN;
          s.onload = function () {
            var rec =
              (window.rrweb && window.rrweb.record) || window.rrwebRecord;
            if (!rec) return;
            rec({
              emit: function (event) {
                if (rrwebEvents.length >= MAX_RRWEB_EVENTS || isCapped())
                  return;
                rrwebEvents.push(event);
              },
            });
          };
          s.onerror = function () {};
          document.head.appendChild(s);
        }
        window.addEventListener("message", function (e) {
          if (!e.data || typeof e.data.type !== "string") return;
          if (e.data.type === "arena:init") {
            if (!meta) startTime = Date.now();
            meta = {
              generationId: e.data.generationId || e.data.modelId,
              tournamentId: e.data.tournamentId,
            };
            persist();
            loadRrweb();
            if (e.source)
              e.source.postMessage(
                { type: "arena:init-ack", generationId: meta.generationId },
                "*",
              );
          }
          if (e.data.type === "arena:flush") {
            var resp = {
              type: "arena:recording-data",
              generationId: meta ? meta.generationId : null,
              rrwebEvents: rrwebEvents,
              analytics: buildAnalytics(),
            };
            try {
              sessionStorage.removeItem(SK);
            } catch (ex) {}
            if (e.source) e.source.postMessage(resp, "*");
          }
        });
        loadRrweb();
      })();
    </script>
    <script data-arena-views="true">
      (function () {
        var isTop = false;
        try {
          isTop = window.self === window.top;
        } catch (e) {}
        if (!isTop) return;
        window.__ARENA_META = {
          generationId: "glm-5",
          tournamentId: "db286503-29e9-4e9b-8915-35de9d977e81",
        };
        var payload = {
          tournamentId: "db286503-29e9-4e9b-8915-35de9d977e81",
          modelId: "glm-5",
        };
        try {
          var r = document.referrer;
          if (r) {
            var u = new URL(r);
            payload.referrerDomain = u.hostname;
          }
        } catch (e) {}
        try {
          var vid = null;
          try {
            vid = localStorage.getItem("arena_vid");
          } catch (e) {}
          if (!vid) {
            vid =
              typeof crypto !== "undefined" && crypto.randomUUID
                ? crypto.randomUUID()
                : (
                    Date.now().toString(36) +
                    Math.random().toString(36).slice(2)
                  ).slice(0, 32);
            try {
              localStorage.setItem("arena_vid", vid);
            } catch (e) {}
          }
          if (vid) payload.viewerId = vid;
        } catch (e) {}
        try {
          fetch("https://www.designarena.ai/api/agon/page-views", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
            keepalive: true,
          });
        } catch (e) {}
      })();
    </script>
